<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabay Trip - Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/account.css">
</head>

<body>

    <nav>
        <div class="navlogo">
            <img src="images/sabaytrip-logo.png">
            <a href="index.html">SabayTrip</a>
        </div>

        <ul class="nav-btn">
            <li><a href="index.html">Home</a></li>
            <li><a href="trip.html">Trip</a></li>
            <li><a href="planner.html">Planner List</a></li>
            <li><a href="account.html" class="active">Account</a></li>
        </ul>
    </nav>

    <!-- PROFILE -->
    <div class="container">
        <div class="card">

            <div class="card-top">
                <div class="avatar">PO</div>

                <div class="info">
                    <h2>Phallyda Ouch</h2>
                    <p>phallyda@example.com</p>
                    <span>Member since April 2026</span>
                </div>
            </div>

            <div class="card-body">

                <h4>ACCOUNT DETAILS</h4>

                <div class="row">
                    <span>Status</span>
                    <span class="badge">Active</span>
                </div>

                <div class="row">
                    <span>Plan</span>
                    <span>Free</span>
                </div>

                <div class="row">
                    <span>Trips saved</span>
                    <span id="tripCount">0</span>
                </div>
                <h4>SECURITY</h4>

                <div class="row">
                    <span>Password</span>
                    <span class="link">Change</span>
                </div>

                <div class="row">
                    <span>Two-factor auth</span>
                    <span>Off</span>
                </div>

                <button onclick="logout()" class="logout">Sign Out</button>

            </div>

        </div>
    </div>

    <script src="js/account.js"></script>

</body>
</html>
